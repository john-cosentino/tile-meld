name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Format, lint, typecheck, unit/integration tests
    runs-on: ubuntu-latest
    services:
      # Backs apps/server's DB integration tests (introduced in Phase 3).
      # See docs/opus-implementation-plan.md §11.4.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tilemeld
          POSTGRES_PASSWORD: tilemeld
          POSTGRES_DB: tilemeld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tilemeld"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://tilemeld:tilemeld@localhost:5432/tilemeld
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit/integration tests
        run: pnpm run test
