name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Format, lint, typecheck, unit/integration tests, build
    runs-on: ubuntu-latest
    services:
      # Backs apps/server's DB integration tests (introduced in Phase 3).
      # See docs/opus-implementation-plan.md §11.4.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tilemeld
          POSTGRES_PASSWORD: tilemeld
          POSTGRES_DB: tilemeld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tilemeld"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://tilemeld:tilemeld@localhost:5432/tilemeld
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit/integration tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  e2e:
    name: End-to-end (${{ matrix.project }})
    needs: checks
    runs-on: ubuntu-latest
    # Each matrix entry runs exactly one Playwright project on its own
    # runner -- the matrix split (not this number) is the real fix for the
    # old one-hour serial-job timeout. 30 minutes gives one project
    # reasonable headroom for CI retries and real rate-limit backoff waits
    # (an isolated Mobile WebKit run has already taken slightly over 20
    # minutes under those conditions) without being so large it would mask
    # a genuinely runaway job.
    timeout-minutes: 30
    strategy:
      # One project's failure must not cancel the other four in-flight
      # runners -- each project's pass/fail is independent signal.
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit
          - project: mobile-chrome
            browser: chromium
          - project: mobile-webkit
            browser: webkit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tilemeld
          POSTGRES_PASSWORD: tilemeld
          POSTGRES_DB: tilemeld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tilemeld"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://tilemeld:tilemeld@localhost:5432/tilemeld
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate database
        run: pnpm --filter @tile-meld/server run migrate

      # --with-deps pulls in the OS-level codec/font libraries each engine
      # needs (e.g. WebKit's libavif16) -- safe here since GitHub's runners
      # give real, unprompted sudo, unlike a typical local sandbox. Only
      # the browser engine this matrix entry's project actually runs on is
      # installed (see the project/browser mapping above -- mobile-chrome
      # and mobile-webkit are device emulations of the desktop chromium/
      # webkit engines, not separate browser binaries).
      - name: Install Playwright browser (${{ matrix.browser }})
        working-directory: e2e
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # e2e/playwright.config.ts's `webServer` entries start both the API
      # server and the Vite dev server automatically (reuseExistingServer
      # is false in CI, so this always spins up its own fresh pair).
      # --project scopes this run to the one project this matrix entry
      # owns; playwright.config.ts's workers: 1 (see the comment there)
      # still applies within that single project's own test files, so the
      # per-IP rate-limit behavior that setting protects against is
      # unchanged -- only the previously-serial cross-project execution is
      # now parallelized, each project against its own runner/IP.
      - name: Run Playwright E2E suite (${{ matrix.project }})
        working-directory: e2e
        run: npx playwright test --project=${{ matrix.project }}

      # Unique per-project artifact name -- actions/upload-artifact@v4
      # rejects re-uploading the same artifact name twice in one workflow
      # run, which a shared "playwright-report" name would hit as soon as
      # a second matrix job tried to upload. e2e/playwright.config.ts's
      # `reporter: "html"` writes to e2e/playwright-report/ by default, so
      # this path matches what the reporter actually produces; if:always()
      # keeps a failed project's diagnostic output uploaded too.
      - name: Upload Playwright report (${{ matrix.project }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: e2e/playwright-report/
          retention-days: 14

  security:
    name: Dependency audit + Docker image scan (Trivy)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # high/critical only -- moderate-and-below in transitive dependencies
      # is common enough noise (and frequently has no available fix yet)
      # that gating every PR on it would train reviewers to ignore this
      # step rather than act on it. Escalate the threshold if that stops
      # being true in practice.
      - name: Dependency audit
        run: pnpm audit --audit-level=high

      - name: Build image for scanning
        run: docker build -t tile-meld:${{ github.sha }} .

      # ignore-unfixed: true -- the same reasoning as the audit-level
      # choice above, but sharper here: an unfixed base-image CVE can't be
      # resolved by anything in this repo, so failing on it would be a
      # permanently-red gate with no available fix rather than a signal
      # anyone can act on.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tile-meld:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"
