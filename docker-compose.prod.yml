# Production compose for deployment Option B: a single VPS running
# Docker Compose + Caddy (plan §12.3). Not used for local dev -- see
# docker-compose.yml for that. Requires a real .env file alongside this
# one (copy .env.example, fill in real secrets -- never commit it) plus a
# DOMAIN env var for Caddy's automatic TLS. See docs/deploy-vps.md for
# the full runbook.
#
# Run with: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tilemeld}
      # The "${VAR:?message}" form errors out at container start if VAR is
      # unset -- a real .env with a real secret is required, not a silent
      # fallback to a guessable default.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env for production, see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-tilemeld}
    volumes:
      - tilemeld-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tilemeld}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No published port: reachable only from other containers on this
    # compose network, never directly from the internet. Exposing
    # Postgres publicly is never part of Option B's "you own more of the
    # ops" tradeoff (plan §12.3).

  # A one-shot pre-traffic release step (plan §12.4, Decision D-MIGRATE:
  # "migrations... run as a pre-traffic release step"). `web` won't start
  # until this exits 0, so a fresh deploy never serves traffic against an
  # unmigrated schema.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tilemeld}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tilemeld}
    command: ["node", "dist/migrate-cli.js", "up"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-tilemeld}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tilemeld}
      SESSION_TOKEN_HMAC_SECRET: ${SESSION_TOKEN_HMAC_SECRET:?SESSION_TOKEN_HMAC_SECRET must be set in .env, generate one via `openssl rand -hex 32`}
      # Left unset (not same-origin cross-site): everything sits behind
      # Caddy on one origin, so the default (CORS disabled/same-origin
      # only) is correct here, not a gap.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # No published port here either -- Caddy is the only public-facing
    # container; it reverse-proxies to web over the internal network.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddyfile placeholders ({$DOMAIN}) resolve from Caddy's own
      # process env, a separate mechanism from Compose's ${DOMAIN}
      # substitution above -- both need this passed through explicitly.
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env -- the domain name pointed at this VPS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  tilemeld-db-data:
  caddy-data:
  caddy-config:
